<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COOLCLIP - Authorization Success</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f4f4f4; }
        .card { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; }
        .icon { font-size: 50px; color: #25f4ee; margin-bottom: 20px; }
        h2 { margin: 0 0 10px 0; color: #333; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; }
        .btn { background: #fe2c55; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

<div class="card">
    <div class="icon">✓</div>
    <h2>TikTok Connected!</h2>
    <p>COOLCLIP has been successfully authorized. You can now start sharing your creative videos.</p>
    <button class="btn" onclick="continueToApp()">Go to Dashboard</button>
</div>

<script>
    function continueToApp() {
        if (window.opener) {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            window.opener.postMessage({ type: 'tiktok_auth_success', code: code }, '*');
        }
        window.close();
    }
</script>

</body>
</html>
